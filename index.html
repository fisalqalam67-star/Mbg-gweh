<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Mbg ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff7eb3,#ff758c,#ffb6c1);
    overflow:hidden;
}

.container{
    width:90%;
    max-width:500px;
    background:white;
    border-radius:30px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff4081;
    margin-bottom:20px;
}

img{
    width:250px;
    border-radius:20px;
    margin-bottom:15px;
}

p{
    color:#ff4081;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    padding:15px 30px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#ff4d6d;
    color:white;
}

.heart{
    position:fixed;
    color:white;
    font-size:25px;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

#message{
    margin-top:20px;
    font-size:24px;
    color:#ff4081;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>Mau kah anda menjadi mbg saya? 💖</h1>

<img src="anjing.jpg" alt="Anjing Lucu">

<p>Pilih dengan hati yaa... 🥰</p>

<div class="buttons">
<button id="yesBtn">Iya 💖</button>
<button id="noBtn">Tidak 😢</button>
</div>

<div id="message"></div>

</div>

<script>

for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.innerHTML="💖";
    heart.className="heart";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(heart);
}

let noCount=0;
let scale=1;

document.getElementById("noBtn").onclick=function(){

    noCount++;
    scale*=0.5;

    this.style.transform=`scale(${scale})`;

    if(noCount>=5){
        this.style.display="none";
    }
}

document.getElementById("yesBtn").onclick=function(){

    document.querySelector(".container").innerHTML=`
        <h1>YEEEEY ❤️🥰</h1>
        <img src="anjing.jpg"
        <p style="font-size:25px;">
            Sekarang kamu resmi jadi mbg saya 💖✨
        </p>
    `;
}
<audio autoplay loop>
    <source src="lagu.mp3" type="audio/mpeg">
</audio>
</script>

</body>
</html>
